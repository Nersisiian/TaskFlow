name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy isort pytest pytest-asyncio pytest-cov httpx
          pip install fastapi[all] uvicorn pydantic-settings python-jose[cryptography] aiohttp redis[hiredis]
          pip install sqlalchemy[asyncio] asyncpg alembic aiokafka
          pip install -r services/gateway/requirements.txt
          pip install -r services/task_service/requirements.txt
          pip install -r services/notification_service/requirements.txt
          pip install -r services/analytics_service/requirements.txt

      - name: Lint with Black
        run: black --check services/ tests/

      - name: Lint with Ruff
        run: ruff check services/ tests/

      - name: Type check with mypy
        run: mypy services/ --ignore-missing-imports --explicit-package-bases

      - name: Check imports with isort
        run: isort --check-only services/ tests/

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          JWT_SECRET: test-secret
        run: |
          pytest -v --cov=services --cov-report=xml --cov-fail-under=50 tests/


