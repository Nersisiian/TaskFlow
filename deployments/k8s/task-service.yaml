apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
      - name: task-service
        image: taskflow/task-service:latest
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: task-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: task-service-svc
spec:
  selector:
    app: task-service
  ports:
  - port: 8001
    targetPort: 8001
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: task-service-config
data:
  DATABASE_URL: "postgresql+asyncpg://taskuser:taskpass@postgres-svc:5432/taskdb"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-svc:9092"
  REDIS_URL: "redis://redis-svc:6379/1"
